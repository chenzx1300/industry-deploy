<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>行业新闻雷达 · 行业雷达</title>
<style>
:root {
  --bg: #ffffff;
  --surface: #ffffff;
  --surface-soft: #f5f5f7;
  --surface-elevated: #ffffff;
  --border: rgba(0, 0, 0, 0.08);
  --border-strong: rgba(0, 0, 0, 0.16);
  --divider: rgba(0, 0, 0, 0.06);
  --text: #1d1d1f;
  --text-soft: #6e6e73;
  --text-faint: #86868b;
  --accent: #0071e3;
  --accent-hover: #0077ed;
  --accent-soft: rgba(0, 113, 227, 0.08);
  --accent-tint: rgba(0, 113, 227, 0.04);
  --cn-tint: #ff3b30;
  --intl-tint: #0071e3;
  --highlight: #fff8e6;
  --font-sans: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-serif: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Songti SC', serif;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.06);
  --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
  --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.10);
  --radius-sm: 8px;
  --radius: 12px;
  --radius-lg: 18px;
}
[data-theme="dark"] {
  --bg: #000000;
  --surface: #1c1c1e;
  --surface-soft: #2c2c2e;
  --surface-elevated: #2c2c2e;
  --border: rgba(255, 255, 255, 0.10);
  --border-strong: rgba(255, 255, 255, 0.18);
  --divider: rgba(255, 255, 255, 0.06);
  --text: #f5f5f7;
  --text-soft: #98989d;
  --text-faint: #6e6e73;
  --accent: #0a84ff;
  --accent-hover: #409cff;
  --accent-soft: rgba(10, 132, 255, 0.16);
  --accent-tint: rgba(10, 132, 255, 0.06);
  --cn-tint: #ff453a;
  --intl-tint: #0a84ff;
  --highlight: #3a2e0a;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
  --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.5);
  --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.6);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  font-size: 17px;
  letter-spacing: -0.01em;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: 'kern' 1, 'liga' 1;
}
.container { max-width: 980px; margin: 0 auto; padding: 64px 32px; }

.theme-toggle {
  position: fixed; top: 24px; right: 24px;
  background: rgba(255, 255, 255, 0.72);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border: 1px solid var(--border);
  padding: 8px 16px;
  border-radius: 980px;
  cursor: pointer;
  color: var(--text);
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-sans);
  box-shadow: var(--shadow-sm);
  transition: all 0.2s;
  z-index: 10;
}
[data-theme="dark"] .theme-toggle {
  background: rgba(28, 28, 30, 0.72);
}
.theme-toggle:hover {
  border-color: var(--border-strong);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}
.theme-toggle:active { transform: translateY(0); }

header { margin-bottom: 56px; }
.chip {
  display: inline-block;
  background: var(--accent-tint);
  color: var(--accent);
  padding: 5px 12px;
  border-radius: 980px;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.02em;
  margin-bottom: 20px;
}
header h1 {
  font-family: var(--font-sans);
  font-size: 56px;
  font-weight: 700;
  line-height: 1.05;
  margin-bottom: 16px;
  letter-spacing: -0.03em;
}
header .meta {
  color: var(--text-soft);
  font-size: 15px;
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  align-items: center;
}
header .meta strong { color: var(--text); font-weight: 600; }
header .meta .dot { color: var(--text-faint); }

nav.tabs {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin: 40px 0 56px;
}
.region-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 18px;
  transition: border-color 0.2s;
}
.region-block:hover { border-color: var(--border-strong); }
.region-block.cn { border-left: 3px solid var(--cn-tint); }
.region-block.intl { border-left: 3px solid var(--intl-tint); }
.region-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--text-faint);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.region-label .flag { font-size: 14px; }
.region-tabs {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
nav.tabs button {
  font-family: var(--font-sans);
  background: transparent;
  border: 1px solid transparent;
  padding: 10px 14px;
  cursor: pointer;
  color: var(--text-soft);
  font-size: 14.5px;
  font-weight: 500;
  border-radius: var(--radius-sm);
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  text-align: left;
  width: 100%;
}
nav.tabs button:hover {
  color: var(--text);
  background: var(--surface-soft);
}
nav.tabs button.active {
  color: var(--accent);
  background: var(--accent-tint);
  font-weight: 600;
}
nav.tabs .name {
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
nav.tabs .count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-faint);
  background: var(--surface-soft);
  padding: 1px 8px;
  border-radius: 980px;
  min-width: 24px;
  flex-shrink: 0;
}
nav.tabs button.active .count {
  color: var(--accent);
  background: var(--surface);
}

main section { margin-bottom: 56px; animation: fadeIn 0.3s ease; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
main section h2 {
  font-family: var(--font-sans);
  font-size: 32px;
  font-weight: 700;
  margin: 0 0 4px;
  letter-spacing: -0.02em;
  line-height: 1.1;
}

.summary {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 28px 32px;
  margin-bottom: 36px;
  box-shadow: var(--shadow-sm);
}
.summary-label {
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.summary-label::before {
  content: '';
  width: 18px;
  height: 1px;
  background: var(--accent);
}
.summary ul { list-style: none; margin-bottom: 16px; }
.summary li {
  padding: 10px 0 10px 22px;
  position: relative;
  font-size: 16px;
  line-height: 1.5;
  color: var(--text);
  border-bottom: 1px solid var(--divider);
  letter-spacing: -0.01em;
}
.summary li:last-child { border-bottom: none; }
.summary li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 18px;
  width: 8px;
  height: 8px;
  background: var(--accent);
  border-radius: 50%;
}
.summary .stats {
  font-size: 13px;
  color: var(--text-soft);
  padding-top: 14px;
  border-top: 1px solid var(--divider);
}

.company-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--divider);
}
.company-header .logo {
  flex-shrink: 0;
  width: 48px;
  height: 48px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-family: var(--font-sans);
  font-weight: 700;
  font-size: 20px;
  letter-spacing: -0.02em;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
}
.company-header .name-block { flex: 1; min-width: 0; }
.company-header h2 {
  font-family: var(--font-sans);
  font-size: 32px;
  font-weight: 700;
  margin: 0 0 4px;
  letter-spacing: -0.02em;
  line-height: 1.1;
}
.company-header .domain {
  font-family: ui-monospace, 'SF Mono', Menlo, monospace;
  font-size: 13px;
  color: var(--text-faint);
}

ul.news-list { list-style: none; }
li.news-item {
  padding: 22px 0;
  border-bottom: 1px solid var(--divider);
  transition: padding-left 0.2s;
}
li.news-item:hover { padding-left: 8px; }
a.news-title {
  color: var(--text);
  text-decoration: none;
  font-size: 19px;
  font-weight: 600;
  display: inline;
  line-height: 1.4;
  font-family: var(--font-sans);
  letter-spacing: -0.015em;
  transition: color 0.15s;
}
li.news-item:hover a.news-title { color: var(--accent); }
a.news-title .arrow {
  font-size: 12px;
  font-weight: 400;
  color: var(--text-faint);
  margin-left: 4px;
  transition: color 0.15s;
}
li.news-item:hover a.news-title .arrow { color: var(--accent); }
p.news-snippet {
  color: var(--text-soft);
  font-size: 15px;
  margin: 8px 0 10px;
  line-height: 1.55;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
span.news-meta {
  color: var(--text-faint);
  font-size: 13px;
  display: inline-flex;
  gap: 8px;
  align-items: center;
}
span.news-meta .dot { color: var(--border-strong); }
.empty {
  color: var(--text-soft);
  padding: 40px 0;
  text-align: center;
  font-size: 15px;
}
footer {
  margin-top: 96px;
  padding-top: 28px;
  border-top: 1px solid var(--divider);
  color: var(--text-faint);
  font-size: 13px;
  text-align: center;
}

.industry-grid {
  list-style: none;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
  margin-top: 40px;
}
.industry-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  overflow: hidden;
}
.industry-card:hover {
  border-color: var(--accent);
  transform: translateY(-4px);
  box-shadow: var(--shadow-md);
}
.industry-card a {
  display: block;
  padding: 32px;
  text-decoration: none;
  color: var(--text);
}
.industry-card h3 {
  font-family: var(--font-sans);
  font-size: 26px;
  font-weight: 700;
  margin-bottom: 10px;
  letter-spacing: -0.02em;
}
.industry-card .stats {
  color: var(--text-soft);
  font-size: 14px;
  display: flex;
  gap: 10px;
}
.industry-card time {
  display: block;
  color: var(--text-faint);
  font-size: 12px;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--divider);
}
.empty-state {
  text-align: center;
  padding: 96px 32px;
  color: var(--text-soft);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
}
.empty-state code {
  font-family: ui-monospace, 'SF Mono', 'Menlo', monospace;
  background: var(--surface-soft);
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 13px;
}

@media (max-width: 640px) {
  .container { padding: 48px 20px; }
  header h1 { font-size: 36px; }
  .region-tabs { grid-template-columns: 1fr; }
  main section h2 { font-size: 28px; }
  .theme-toggle { top: 16px; right: 16px; padding: 6px 12px; font-size: 12px; }
  .industry-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="container">
  <header>
    <span class="chip">行业雷达</span>
    <h1>行业新闻雷达</h1>
    <p class="meta"><span>头部公司的最新动态</span><span class="dot">·</span><span>本地生成</span></p>
  </header>
  <main><ul class="industry-grid">
    <li class="industry-card">
      <a href="semiconductor-industry/">
        <h3>半导体</h3>
        <span class="stats">
          <span>9 家公司</span>
          <span>·</span>
          <span>74 条新闻</span>
        </span>
        <time>生成于 2026-06-23</time>
      </a>
    </li>
  
    <li class="industry-card">
      <a href="new-energy-vehicles-industry/">
        <h3>新能源汽车</h3>
        <span class="stats">
          <span>6 家公司</span>
          <span>·</span>
          <span>61 条新闻</span>
        </span>
        <time>生成于 2026-06-23</time>
      </a>
    </li>
  
    <li class="industry-card">
      <a href="carbon-fiber-industry/">
        <h3>碳纤维</h3>
        <span class="stats">
          <span>6 家公司</span>
          <span>·</span>
          <span>39 条新闻</span>
        </span>
        <time>生成于 2026-06-23</time>
      </a>
    </li>
  </ul></main>
  <footer>本地生成 · 数据来源：Google News</footer>
</div>
<script>
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const target = tab.dataset.co;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('section[data-co]').forEach(s => s.hidden = s.dataset.co !== target);
    tab.classList.add('active');
    history.replaceState(null, '', '#' + target);
  });
});
window.addEventListener('DOMContentLoaded', () => {
  const hash = location.hash.replace('#', '');
  if (hash) {
    const tab = document.querySelector('.tab[data-co="' + hash + '"]');
    if (tab) tab.click();
  }
  const theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  document.documentElement.dataset.theme = theme;
  const btn = document.querySelector('.theme-toggle');
  if (btn) {
    btn.textContent = theme === 'dark' ? '☀️ 浅色' : '🌙 深色';
    btn.addEventListener('click', () => {
      const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
      document.documentElement.dataset.theme = next;
      localStorage.setItem('theme', next);
      btn.textContent = next === 'dark' ? '☀️ 浅色' : '🌙 深色';
    });
  }
});
</script>
</body>
</html>
