name: Daily Industry Update

on:
  schedule:
    # Daily at 08:00 UTC = 16:00 Beijing time
    - cron: '0 8 * * *'
  workflow_dispatch:  # Manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run daily update
        id: update
        run: node scripts/daily-update.mjs

      - name: Show build summary
        run: cat data/latest-build.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Track docs/ (served HTML) and data/latest-build.json (build summary).
          # Other data/ files are .gitignored — runtime artifacts.
          git add docs/ data/latest-build.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily update $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Create GitHub Issue with URLs
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('data/latest-build.json', 'utf-8'));
            const date = summary.date;
            const baseUrl = `https://${context.repo.owner}.github.io/${context.repo.repo}`;
            const ok = summary.results.filter(r => r.ok);
            const failed = summary.results.filter(r => !r.ok);

            const body = [
              `## 📡 Daily Update — ${date}`,
              '',
              ...ok.map(r => `- **[${r.prompt}](${baseUrl}/${r.slug}/)** · ${r.news_count} news · ${r.total_companies} companies`),
              '',
              failed.length ? `\n### ⚠️ Failed\n${failed.map(r => `- ${r.slug}: ${r.error}`).join('\n')}` : '',
              '\n---\n_Automated by industry-news-radar. Site live at <https://github.com/${context.repo.owner}/${context.repo.repo}>._'
            ].filter(Boolean).join('\n');

            // Find existing open daily-update issue, or create new
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'daily-update',
              per_page: 1,
            });

            const existing = issues.data.find(i => i.title.startsWith('📡 Daily Update'));
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: body,
              });
              core.info(`Updated issue #${existing.number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `📡 Daily Update ${date}`,
                body: body,
                labels: ['daily-update'],
              });
              core.info(`Created new daily-update issue`);
            }